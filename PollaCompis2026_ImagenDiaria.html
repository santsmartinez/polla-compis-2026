<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{--rojo:#C8102E;--azul:#0A1628;--oro:#FFD700;}
body{font-family:'DM Sans',sans-serif;background:#0A1628;color:#fff;min-height:100vh;padding:1.5rem 1rem 4rem}

.ctrl{max-width:680px;margin:0 auto 1.5rem}
.ctrl h1{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;color:#fff;margin-bottom:4px}
.ctrl p{font-size:13px;color:#8899B8;margin-bottom:1.25rem}
.ctrl-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.fld{flex:1;min-width:160px}
.fld label{display:block;font-size:11px;color:#8899B8;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
select{width:100%;padding:9px 12px;background:#132038;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer}
select:focus{outline:none;border-color:#C8102E}
option{background:#132038}
.btn{padding:10px 22px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:transform .1s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-gen{background:#C8102E;color:#fff}
.btn-dl{background:#FFD700;color:#0A1628}
.btn-dl:disabled{opacity:.4;cursor:not-allowed}

#preview{max-width:680px;margin:0 auto}
.card-wrap{display:none}
.card-wrap.show{display:block}

#card{background:#0A1628;border-radius:16px;overflow:hidden;position:relative;width:100%;font-family:'DM Sans',sans-serif;}

.card-top{background:linear-gradient(135deg,#C8102E 0%,#8B0020 100%);padding:18px 22px 16px;position:relative;overflow:hidden}
.card-top::before{content:'';position:absolute;right:-30px;top:-30px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.06)}
.card-top::after{content:'';position:absolute;right:40px;bottom:-50px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.04)}
.card-brand{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.card-brand h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:#fff}
.card-brand .badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;color:#fff}

.partido-hero{padding:20px 22px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
.fase-chip{display:inline-block;background:rgba(200,16,46,.2);border:1px solid rgba(200,16,46,.4);border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;color:#FF8A80;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.horarios-zonas{font-size:10px;color:#8899B8;margin-bottom:10px;line-height:1.4}
.equipos{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.equipo-l{text-align:right}
.equipo-r{text-align:left}
.eq-flag{font-size:30px;display:block;margin-bottom:4px}
.eq-name{font-size:17px;font-weight:700;color:#fff;line-height:1.2}
.vs-sep{text-align:center}
.vs-txt{font-family:'Bebas Neue',sans-serif;font-size:26px;color:rgba(255,255,255,.2);display:block}

.prono-section{padding:16px 22px 20px}
.prono-title{font-size:10px;font-weight:700;color:#8899B8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.prono-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07)}
.prono-grid{display:flex;flex-direction:column;gap:7px}
.prono-row{display:grid;grid-template-columns:1fr 80px 1fr;align-items:center;gap:8px;background:rgba(255,255,255,.04);border-radius:8px;padding:9px 12px;border:1px solid rgba(255,255,255,.06)}
.prono-row:nth-child(even){background:rgba(255,255,255,.02)}
.pr-nombre{font-size:13px;font-weight:600;color:#E0E8F0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr-score{text-align:center}
.pr-score-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#FFD700;letter-spacing:1px;display:block;line-height:1}
.pr-score-nd{font-size:13px;color:#4A5568;display:block;line-height:1;padding:4px 0}
.pr-signo{text-align:right}
.pr-signo-val{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.05em}
.sig-L{background:rgba(34,197,94,.15);color:#86EFAC;border:1px solid rgba(34,197,94,.25)}
.sig-V{background:rgba(200,16,46,.15);color:#FCA5A5;border:1px solid rgba(200,16,46,.25)}
.sig-X{background:rgba(255,215,0,.12);color:#FDE68A;border:1px solid rgba(255,215,0,.2)}

.card-foot{background:rgba(255,255,255,.03);border-top:1px solid rgba(255,255,255,.06);padding:10px 22px;display:flex;justify-content:space-between;align-items:center}
.foot-txt{font-size:10px;color:#4A5568}
.foot-logo{font-family:'Bebas Neue',sans-serif;font-size:14px;color:#C8102E;letter-spacing:1px}

.ld{text-align:center;padding:2rem;color:#8899B8;font-size:13px}
.err{color:#FF8A80;font-size:13px;background:rgba(200,16,46,.1);border:1px solid rgba(200,16,46,.2);border-radius:8px;padding:10px 14px;margin-top:1rem}

/* ---- PESTAÑAS ---- */
.tabs{max-width:680px;margin:0 auto 1rem;display:none;gap:0;border-bottom:1px solid rgba(255,255,255,.1)}
.tabs.show{display:flex}
.tab-btn{flex:1;padding:10px 0;background:none;border:none;border-bottom:2px solid transparent;color:#8899B8;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.04em;transition:color .15s,border-color .15s;margin-bottom:-1px}
.tab-btn.active{color:#FFD700;border-bottom-color:#FFD700}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ---- BOTONES DE DESCARGA POR PESTAÑA ---- */
.dl-row{max-width:680px;margin:.75rem auto 0;display:none;justify-content:flex-end}
.dl-row.show{display:flex}

/* ---- TARJETA ESTADÍSTICAS ---- */
#cardStats{background:#0A1628;border-radius:16px;overflow:hidden;position:relative;width:100%;font-family:'DM Sans',sans-serif;}
.st-top{background:linear-gradient(135deg,#1a3a5c 0%,#0d2340 100%);padding:18px 22px 16px;position:relative;overflow:hidden}
.st-top::before{content:'';position:absolute;right:-30px;top:-30px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.05)}
.st-brand{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.st-brand h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:#fff}
.st-brand .badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;color:#fff}
.st-partido-hero{padding:16px 22px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.st-fase-chip{display:inline-block;background:rgba(26,90,180,.3);border:1px solid rgba(26,90,180,.5);border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;color:#93C5FD;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.st-equipos{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.st-eq-l{text-align:right}
.st-eq-r{text-align:left}
.st-eq-flag{font-size:28px;display:block;margin-bottom:3px}
.st-eq-name{font-size:16px;font-weight:700;color:#fff;line-height:1.2}
.st-vs{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:24px;color:rgba(255,255,255,.2)}
.st-body{padding:16px 22px 20px}
.st-sec-title{font-size:10px;font-weight:700;color:#8899B8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.st-sec-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07)}

/* Cards de distribución */
.st-dist{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.st-dist-card{background:rgba(255,255,255,.05);border-radius:10px;padding:12px 10px;text-align:center;border:1px solid rgba(255,255,255,.08)}
.st-dist-card.winner{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.08)}
.st-dist-flag{font-size:22px;margin-bottom:4px}
.st-dist-label{font-size:10px;color:#8899B8;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-dist-num{font-family:'Bebas Neue',sans-serif;font-size:32px;color:#fff;line-height:1}
.st-dist-card.winner .st-dist-num{color:#86EFAC}

/* Resultado más votado */
.st-top-result{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.st-top-score{font-family:'Bebas Neue',sans-serif;font-size:34px;color:#FFD700;letter-spacing:2px}
.st-top-meta{text-align:right}
.st-top-count{font-size:20px;font-weight:700;color:#fff}
.st-top-label{font-size:11px;color:#8899B8;margin-top:2px}

/* Tabla de resultados */
.st-table{width:100%;border-collapse:collapse;font-size:12px}
.st-table th{font-size:10px;font-weight:700;color:#8899B8;text-transform:uppercase;letter-spacing:.06em;padding:4px 6px;text-align:left;border-bottom:1px solid rgba(255,255,255,.07)}
.st-table th:last-child{text-align:right}
.st-table td{padding:6px 6px;border-bottom:1px solid rgba(255,255,255,.04);color:#E0E8F0;vertical-align:top}
.st-table td:first-child{font-family:'Bebas Neue',sans-serif;font-size:16px;color:#FFD700;letter-spacing:1px;white-space:nowrap}
.st-table td:last-child{text-align:right;color:#8899B8}
.st-table tr.st-unique td{color:#FCA5A5}
.st-table tr.st-unique td:first-child{color:#FCA5A5}
.st-table tr.st-top-row td{color:#86EFAC}
.st-table tr.st-top-row td:first-child{color:#86EFAC}
.st-foot{background:rgba(255,255,255,.03);border-top:1px solid rgba(255,255,255,.06);padding:10px 22px;display:flex;justify-content:space-between;align-items:center}
.st-foot-txt{font-size:10px;color:#4A5568}
.st-foot-logo{font-family:'Bebas Neue',sans-serif;font-size:14px;color:#FFD700;letter-spacing:1px}
</style>
</head>

document.getElementById("btnGen").addEventListener("click",generarImagen);

async function generarImagen(){
  var pid=parseInt(document.getElementById("selPartido").value);
  var partido=TODOS.find(function(p){return p.id===pid;});
  if(!partido)return;

  var msg=document.getElementById("genMsg");
  msg.innerHTML="<div class='ld'>Cargando pronósticos…</div>";
  document.getElementById("btnDlPronos").disabled=true;
  document.getElementById("btnDlStats").disabled=true;

  try{
    // Cargar participantes y resultados en paralelo
    var [rParts, rRes] = await Promise.all([
      fetch(SB+"/rest/v1/participantes?validado=eq.true&select=nombre,pronos&order=nombre",{headers:{"apikey":SK,"Authorization":"Bearer "+SK}}),
      fetch(SB+"/rest/v1/resultados?select=partido_id,local,visitante&partido_id=gte.73",{headers:{"apikey":SK,"Authorization":"Bearer "+SK}})
    ]);
    var parts=await rParts.json();
    var resElim=await rRes.json();
    if(!parts||!parts.length){msg.innerHTML="<div class='err'>No hay participantes validados aún.</div>";return;}

    // Construir mapa de nombres reales para eliminatorias
    var nombresReales={};
    (resElim||[]).forEach(function(r){
      if(r.local||r.visitante)nombresReales[r.partido_id]={l:r.local||"",v:r.visitante||""};
    });

    // Obtener nombres del partido — para elim usar nombres reales si existen
    var nomL=partido.l, nomV=partido.v;
    if(pid>=73&&nombresReales[pid]){
      if(nombresReales[pid].l)nomL=nombresReales[pid].l;
      if(nombresReales[pid].v)nomV=nombresReales[pid].v;
    }

    var esElim=(pid>=73);
    var rows;

    if(!esElim){
      // GRUPOS: mostrar todos con su pronóstico
      rows=parts.map(function(p){
        var pr=(p.pronos||{})[pid];
        return{nombre:p.nombre,gl:pr&&pr.gl!=null?pr.gl:null,gv:pr&&pr.gv!=null?pr.gv:null,muestra:true};
      });
    } else {
      // ELIMINATORIAS: solo mostrar los que tienen alguno de los dos equipos correctos
      // (pueden sumar puntos de clasificado, signo o exacto)
      var nomLn=nomL.trim().toLowerCase();
      var nomVn=nomV.trim().toLowerCase();
      rows=[];
      parts.forEach(function(p){
        var pr=(p.pronos||{})[pid];
        if(!pr||pr.gl==null||pr.gv==null)return; // sin pronóstico para este partido
        var pl=(pr.pl||"").trim().toLowerCase();
        var pv=(pr.pv||"").trim().toLowerCase();
        // Si los nombres reales no están cargados aún, mostrar todos con pronóstico
        if(!nomLn||!nomVn){
          rows.push({nombre:p.nombre,gl:pr.gl,gv:pr.gv,pl:pr.pl,pv:pr.pv,muestra:true});
          return;
        }
        // Tiene al menos uno de los dos equipos correctos → puede sumar puntos clasificado
        var tieneL=(pl===nomLn||pl===nomVn); // alguno de sus pronosticados es el local real
        var tieneV=(pv===nomLn||pv===nomVn); // alguno de sus pronosticados es el visitante real
        if(tieneL||tieneV){
          rows.push({nombre:p.nombre,gl:pr.gl,gv:pr.gv,pl:pr.pl,pv:pr.pv,
            tieneL:tieneL,tieneV:tieneV,ambos:(tieneL&&tieneV)});
        }
      });
    }

    if(!rows.length&&esElim){
      msg.innerHTML="<div class='err'>Ningún participante tiene alguno de los dos equipos en este partido. Verifica que los nombres en Resultados del Admin coincidan exactamente con los pronósticos.</div>";
      return;
    }

    renderCard(partido,nomL,nomV,rows,esElim);
    renderStats(partido,nomL,nomV,rows,esElim);
    msg.innerHTML="";
    document.getElementById("btnDlPronos").disabled=false;
    document.getElementById("btnDlStats").disabled=false;
    // Mostrar pestañas y botones
    document.getElementById("tabsRow").classList.add("show");
    document.getElementById("dlRowPronos").classList.add("show");
    document.getElementById("dlRowStats").classList.add("show");
    switchTab("pronos");

  }catch(e){
    msg.innerHTML="<div class='err'>Error: "+e.message+"</div>";
  }
}

// ---- CONVERSIÓN HORARIA ----
function horariosZonas(f){
  // f tiene formato "DD Mon HH:MM" en hora ET (Miami/Bogotá, UTC-5 en invierno / UTC-4 en verano)
  // Durante el Mundial 2026 (jun-jul) ET = UTC-4, Bogotá = UTC-5 → Bogotá = ET - 1h
  var partes=f.split(" ");
  if(partes.length<3)return "";
  var hm=partes[2].split(":");
  if(hm.length<2)return "";
  var hET=parseInt(hm[0]),min=parseInt(hm[1]);
  function fmt(h,m){var hh=((h%24)+24)%24;return(hh<10?"0":"")+hh+":"+(m<10?"0":"")+m;}
  var bog=fmt(hET-1,min);   // Bogotá = ET - 1h
  var mia=fmt(hET,min);     // Miami = ET
  var mex=fmt(hET-1,min);   // México Ciudad = ET - 1h (mismo que Bogotá en verano)
  var bol=fmt(hET+1,min);   // Bolivia = ET + 1h
  var fra=fmt(hET+6,min);   // Francia = ET + 6h
  return "🕐 Bogotá "+bog+" · Miami "+mia+" · México "+mex+" · Bolivia "+bol+" · Francia "+fra;
}

function signo(gl,gv,nomL,nomV){
  if(gl==null||gv==null)return{txt:"—",cls:""};
  if(gl>gv)return{txt:"🏠 "+nomL,cls:"sig-L"};
  if(gl<gv)return{txt:"✈️ "+nomV,cls:"sig-V"};
  return{txt:"Empate",cls:"sig-X"};
}

  var tituloSec=esElim
    ? "Con opciones de sumar · "+rows.length+" jugador"+(rows.length!==1?"es":"")

  var html="";
  html+="<div class=\'card-top\'><div class=\'card-brand\'><h2>⚽ Polla Compis 2026</h2><span class=\'badge\'>PRONÓSTICOS</span></div></div>";
  html+="<div class=\'partido-hero\'>";
  html+="<div class=\'fase-chip\'>"+partido.fase+" · "+partido.f+"</div>";
  html+="<div class=\'horarios-zonas\'>"+horariosZonas(partido.f)+"</div>";
  html+="<div class=\'equipos\'>";
  html+="<div class=\'equipo-l\'><span class=\'eq-flag\'>"+fL+"</span><div class=\'eq-name\'>"+esc(nomL)+"</div></div>";
  html+="<div class=\'vs-sep\'><span class=\'vs-txt\'>VS</span></div>";
  html+="<div class=\'equipo-r\'><span class=\'eq-flag\'>"+fV+"</span><div class=\'eq-name\'>"+esc(nomV)+"</div></div>";
  html+="</div></div>";
  html+="<div class=\'prono-section\'>";
  html+="<div class=\'prono-title\'>"+tituloSec+"</div>";
  html+="<div class=\'prono-grid\'>";
  rows.forEach(function(r){
    var s=signo(r.gl,r.gv,nomL,nomV);
    var badge="";
    if(esElim){
      if(r.ambos)badge="<span style=\'font-size:9px;background:rgba(34,197,94,.2);color:#86EFAC;border:1px solid rgba(34,197,94,.3);border-radius:4px;padding:1px 5px;margin-left:6px\'>2 ✓</span>";
      else badge="<span style=\'font-size:9px;background:rgba(255,215,0,.15);color:#FDE68A;border:1px solid rgba(255,215,0,.25);border-radius:4px;padding:1px 5px;margin-left:6px\'>1 ✓</span>";
    }
    html+="<div class=\'prono-row\'>";
    html+="<div class=\'pr-nombre\'>"+esc(r.nombre)+badge+"</div>";
    html+="<div class=\'pr-score\'><span class=\'pr-score-val\'>"+r.gl+" – "+r.gv+"</span></div>";
    html+="<div class=\'pr-signo\'><span class=\'pr-signo-val "+s.cls+"\'>"+s.txt+"</span></div>";
    html+="</div>";
  });
  html+="</div></div>";
  html+="<div class=\'card-foot\'><span class=\'foot-txt\'>"+ahora+"</span><span class=\'foot-logo\'>POLLA COMPIS 2026</span></div>";
  var card=document.getElementById("card");
  card.innerHTML=html;
  document.getElementById("cardWrap").classList.add("show");
  card.scrollIntoView({behavior:"smooth",block:"start"});
}

// ---- RENDER ESTADÍSTICAS ----
function renderStats(partido,nomL,nomV,rows,esElim){
  var fL=flag(nomL),fV=flag(nomV);
  var ahora=new Date().toLocaleDateString("es-CO",{day:"2-digit",month:"short",year:"numeric"});
  var total=rows.length;

  // Distribución ganador
  var cL=0,cV=0,cX=0;
  rows.forEach(function(r){
    if(r.gl==null||r.gv==null)return;
    if(r.gl>r.gv)cL++;
    else if(r.gl<r.gv)cV++;
    else cX++;
  });

  // Conteo por resultado exacto
  var conteo={};
  rows.forEach(function(r){
    if(r.gl==null||r.gv==null)return;
    var k=r.gl+"-"+r.gv;
    conteo[k]=(conteo[k]||0)+1;
  });
  var entradas=Object.keys(conteo).map(function(k){return{key:k,n:conteo[k]};});
  entradas.sort(function(a,b){return b.n-a.n;});

  var maxN=entradas.length?entradas[0].n:0;
  var minN=entradas.length?entradas[entradas.length-1].n:0;

  // Winner de distribución
  var winClass="";
  if(cL>cV&&cL>cX)winClass="L";
  else if(cV>cL&&cV>cX)winClass="V";
  else if(cX>cL&&cX>cV)winClass="X";

  var subtitulo=esElim
    ? "Estadísticas · "+total+" jugador"+(total!==1?"es":"")+" con clasificado acertado"
    : "Estadísticas · "+total+" jugador"+(total!==1?"es":"");

  var html="";
  html+="<div class='st-top'><div class='st-brand'><h2>⚽ Polla Compis 2026</h2><span class='badge'>ESTADÍSTICAS</span></div></div>";

  // Hero partido
  html+="<div class='st-partido-hero'>";
  html+="<div class='st-fase-chip'>"+esc(partido.fase)+" · "+esc(partido.f)+"</div>";
  html+="<div class='horarios-zonas'>"+horariosZonas(partido.f)+"</div>";
  html+="<div class='st-equipos'>";
  html+="<div class='st-eq-l'><span class='st-eq-flag'>"+fL+"</span><div class='st-eq-name'>"+esc(nomL)+"</div></div>";
  html+="<div class='st-vs'>VS</div>";
  html+="<div class='st-eq-r'><span class='st-eq-flag'>"+fV+"</span><div class='st-eq-name'>"+esc(nomV)+"</div></div>";
  html+="</div></div>";

  html+="<div class='st-body'>";

  // Distribución
  html+="<div class='st-sec-title'>Distribución de pronósticos</div>";
  html+="<div class='st-dist'>";
  html+="<div class='st-dist-card"+(winClass==="L"?" winner":"")+"'>";
  html+="<div class='st-dist-flag'>"+fL+"</div>";
  html+="<div class='st-dist-label'>"+esc(nomL)+"</div>";
  html+="<div class='st-dist-num'>"+cL+"</div></div>";
  html+="<div class='st-dist-card"+(winClass==="X"?" winner":"")+"'>";
  html+="<div class='st-dist-flag'>🤝</div>";
  html+="<div class='st-dist-label'>Empate</div>";
  html+="<div class='st-dist-num'>"+cX+"</div></div>";
  html+="<div class='st-dist-card"+(winClass==="V"?" winner":"")+"'>";
  html+="<div class='st-dist-flag'>"+fV+"</div>";
  html+="<div class='st-dist-label'>"+esc(nomV)+"</div>";
  html+="<div class='st-dist-num'>"+cV+"</div></div>";
  html+="</div>";

  // Resultado más votado
  if(entradas.length){
    var top=entradas[0];
    var parts=top.key.split("-");
    var sTop=signo(parseInt(parts[0]),parseInt(parts[1]),nomL,nomV);
    html+="<div class='st-sec-title'>Resultado más votado</div>";
    html+="<div class='st-top-result'>";
    html+="<span class='st-top-score'>"+parts[0]+" – "+parts[1]+"</span>";
    html+="<div class='st-top-meta'>";
    html+="<div class='st-top-count'>"+top.n+" voto"+(top.n!==1?"s":"")+"</div>";
    html+="<div class='st-top-label'>"+sTop.txt+"</div>";
    html+="</div></div>";
  }

  // Tabla de frecuencias
  html+="<div class='st-sec-title'>Todos los resultados</div>";
  html+="<table class='st-table'>";
  html+="<thead><tr><th>Resultado</th><th>Signo</th><th>Votos</th></tr></thead><tbody>";
  entradas.forEach(function(e){
    var ps=e.key.split("-");
    var sg=signo(parseInt(ps[0]),parseInt(ps[1]),nomL,nomV);
    var rowCls=e.n===maxN?" st-top-row":e.n===minN&&minN<maxN?" st-unique":"";
    html+="<tr class='"+rowCls+"'>";
    html+="<td>"+ps[0]+" – "+ps[1]+"</td>";
    html+="<td>"+sg.txt+"</td>";
    html+="<td>"+e.n+"</td>";
    html+="</tr>";
  });
  html+="</tbody></table>";

  html+="</div>";
  html+="<div class='st-foot'><span class='st-foot-txt'>"+ahora+" · "+subtitulo+"</span><span class='st-foot-logo'>POLLA COMPIS 2026</span></div>";

  var card=document.getElementById("cardStats");
  card.innerHTML=html;
  document.getElementById("cardStatsWrap").classList.add("show");
}

function descargarPNG(cardId,filename,btn){
  var origTxt=btn.textContent;
  btn.textContent="Generando…";btn.disabled=true;
  function capturar(){
    html2canvas(document.getElementById(cardId),{scale:3,backgroundColor:"#0A1628",useCORS:true,logging:false})
    .then(function(canvas){
      var a=document.createElement("a");
      a.href=canvas.toDataURL("image/png");
      a.download=filename;
      a.click();
      btn.textContent="✓ Descargado";btn.style.background="#22C55E";btn.disabled=false;
      setTimeout(function(){btn.textContent=origTxt;btn.style.background="#FFD700";},2500);
    }).catch(function(){btn.textContent=origTxt;btn.disabled=false;});
  }
  if(typeof html2canvas==="undefined"){
    var s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
    s.onload=capturar;
    s.onerror=function(){btn.textContent=origTxt;btn.disabled=false;alert("Error cargando librería.");};
    document.head.appendChild(s);
  } else { capturar(); }
}
