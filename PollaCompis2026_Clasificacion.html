function sortGrupo(equipos,stats){
  return equipos.slice().sort(function(a,b){
    var sa=stats[a],sb=stats[b];
    if(sb.pts!==sa.pts)return sb.pts-sa.pts;
    if(sb.dg!==sa.dg)return sb.dg-sa.dg;
    if(sb.gf!==sa.gf)return sb.gf-sa.gf;
    var gca=sa.gf-sa.dg,gcb=sb.gf-sb.dg;
    if(gca!==gcb)return gca-gcb;
    return a.localeCompare(b);
  });
}

function clasGrupoReal(g){
  var eq=GEQ_G[g];var s={};eq.forEach(function(e){s[e]={pts:0,dg:0,gf:0};});
  GPIDS_G[g].forEach(function(pid){
    var r=res[pid];if(!r||r.gl==null||r.gv==null)return;
    var pa=TODOS.find(function(p){return p.id===pid;});if(!pa)return;
    s[pa.l].gf+=r.gl;s[pa.l].dg+=(r.gl-r.gv);s[pa.v].gf+=r.gv;s[pa.v].dg+=(r.gv-r.gl);
    if(r.gl>r.gv)s[pa.l].pts+=3;else if(r.gl<r.gv)s[pa.v].pts+=3;else{s[pa.l].pts+=1;s[pa.v].pts+=1;}
  });
  return sortGrupo(eq,s);
}


function clasGrupoProno(g,pronos){
  var eq=GEQ_G[g];var s={};eq.forEach(function(e){s[e]={pts:0,dg:0,gf:0};});
  GPIDS_G[g].forEach(function(pid){
    var pr=pronos[pid];if(!pr||pr.gl==null||pr.gv==null)return;
    var pa=TODOS.find(function(p){return p.id===pid;});if(!pa)return;
    s[pa.l].gf+=pr.gl;s[pa.l].dg+=(pr.gl-pr.gv);
    s[pa.v].gf+=pr.gv;s[pa.v].dg+=(pr.gv-pr.gl);
    if(pr.gl>pr.gv)s[pa.l].pts+=3;else if(pr.gl<pr.gv)s[pa.v].pts+=3;
    else{s[pa.l].pts+=1;s[pa.v].pts+=1;}
  });
  return sortGrupo(eq,s);
}
function ptsGrupoPos(g,pronos){
  var pids=GPIDS_G[g];
  if(!pids.every(function(pid){var r=res[pid];return r&&r.gl!=null&&r.gv!=null;}))return 0;
  if(!pids.every(function(pid){var pr=pronos[pid];return pr&&pr.gl!=null&&pr.gv!=null;}))return 0;
  var real=clasGrupoReal(g);var prono=clasGrupoProno(g,pronos);
  var pts=0;for(var i=0;i<4;i++){if(real[i]===prono[i])pts+=2;}
  return pts;
}

function calcP(pr,real,fase){
  if(!real||real.gl==null||!pr||pr.gl==null)return null;
  var reg=PTS[fase]||PTS.grupos;var t=0;
  if(fase==="grupos"){
    var sR=real.gl>real.gv?"L":real.gl<real.gv?"V":"X";
    var sP=pr.gl>pr.gv?"L":pr.gl<pr.gv?"V":"X";
    if(sR===sP)t+=reg.s;if(real.gl===pr.gl&&real.gv===pr.gv)t+=reg.e;
  }else{
    var rl=(real.rl||"").trim().toLowerCase(),rv=(real.rv||"").trim().toLowerCase();
    var pl=(pr.pl||"").trim().toLowerCase(),pv=(pr.pv||"").trim().toLowerCase();
    var tenemosEq=(rl!==""&&rv!==""),tenemosP=(pl!==""&&pv!=="");
    var cruceEx=tenemosEq&&tenemosP&&(rl===pl&&rv===pv);
    if(cruceEx){
      var sR2=real.gl>real.gv?"L":real.gl<real.gv?"V":"X";
      var sP2=pr.gl>pr.gv?"L":pr.gl<pr.gv?"V":"X";
      if(reg.x)t+=reg.x;if(sR2===sP2)t+=reg.s;if(real.gl===pr.gl&&real.gv===pr.gv)t+=reg.e;
    }else if(!tenemosEq){
      var sR3=real.gl>real.gv?"L":real.gl<real.gv?"V":"X";
      var sP3=pr.gl>pr.gv?"L":pr.gl<pr.gv?"V":"X";
      if(sR3===sP3)t+=reg.s;if(real.gl===pr.gl&&real.gv===pr.gv)t+=reg.e;
    }
  }
  return t;
}


var SLOTS={
  73:["2A","2B"],74:["1E","3ABCDF"],75:["1F","2C"],76:["1C","2F"],
  77:["1I","3CDFGH"],78:["2E","2I"],79:["1A","3CEFHI"],80:["1L","3EHIJK"],
  81:["1D","3BEFIJ"],82:["1G","3AEHIJ"],83:["2K","2L"],84:["1H","2J"],
  85:["1B","3EFGIJ"],86:["1J","2H"],87:["1K","3DEIJL"],88:["2D","2G"],
  89:["W73","W75"],90:["W74","W77"],91:["W76","W78"],92:["W79","W80"],
  93:["W83","W84"],94:["W81","W82"],95:["W86","W88"],96:["W85","W87"],
  97:["W89","W90"],98:["W93","W94"],99:["W91","W92"],100:["W95","W96"],
  101:["W97","W98"],102:["W99","W100"],103:["L101","L102"],104:["W101","W102"]
};
var D16SLOTS={"3ABCDF":74,"3CDFGH":77,"3CEFHI":79,"3EHIJK":80,"3BEFIJ":81,"3AEHIJ":82,"3EFGIJ":85,"3DEIJL":87};
function resolverSlot(slot){
  if(!slot)return"";
  var mW=slot.match(/^W(\d+)$/);
  if(mW){var pid=parseInt(mW[1]);var r=res[pid];
    if(!r||r.gl==null)return slot;
    if(r.gl>r.gv)return r.rl||slot;if(r.gv>r.gl)return r.rv||slot;
    if(r.penWin==="L")return r.rl||slot;if(r.penWin==="V")return r.rv||slot;
    return(r.rl||"Local")+" (pen?)";}
  var mL=slot.match(/^L(\d+)$/);
  if(mL){var pid2=parseInt(mL[1]);var r2=res[pid2];
    if(!r2||r2.gl==null)return slot;
    if(r2.gl>r2.gv)return r2.rv||slot;if(r2.gv>r2.gl)return r2.rl||slot;
    if(r2.penWin==="L")return r2.rv||slot;if(r2.penWin==="V")return r2.rl||slot;
    return(r2.rv||"Visitante")+" (pen?)";}
  return slot;
}
function getMejorTerceroClas(pid16){
  var gLetter=D16SLOTS;var grupos=null;
  Object.keys(gLetter).forEach(function(k){if(gLetter[k]===pid16)grupos=k;});
  if(!grupos)return null;
  var letras=grupos.replace(/[^A-L]/g,"").split("");
  var allTerceros=Object.keys(GEQ_G).map(function(g){
    var clas=clasGrupoReal(g);var eq=clas[2];if(!eq)return null;
    var s={pts:0,dg:0,gf:0};
    GPIDS_G[g].forEach(function(pid){
      var r=res[pid];if(!r||r.gl==null||r.gv==null)return;
      var pa=TODOS.find(function(p){return p.id===pid;});if(!pa)return;
      if(pa.l===eq){s.pts+=(r.gl>r.gv?3:r.gl===r.gv?1:0);s.gf+=r.gl;s.dg+=(r.gl-r.gv);}
      if(pa.v===eq){s.pts+=(r.gv>r.gl?3:r.gl===r.gv?1:0);s.gf+=r.gv;s.dg+=(r.gv-r.gl);}
    });
    return{equipo:eq,grupo:g,pts:s.pts,dg:s.dg,gf:s.gf};
  }).filter(Boolean);
  allTerceros.sort(function(a,b){
    if(b.pts!==a.pts)return b.pts-a.pts;if(b.dg!==a.dg)return b.dg-a.dg;
    if(b.gf!==a.gf)return b.gf-a.gf;return a.equipo.localeCompare(b.equipo);
  });
  var top8=allTerceros.slice(0,8);
  var candidatos=top8.filter(function(t){return letras.indexOf(t.grupo)>=0;});
  return candidatos.length?candidatos[0].equipo:null;
}
function resolverSlot16Clas(slot){
  if(!slot)return"";
  var m1=slot.match(/^([12])([A-L])$/);
  if(m1){var pos=parseInt(m1[1])-1,g=m1[2];var c=clasGrupoReal(g);return c[pos]||slot;}
  if(D16SLOTS[slot]!==undefined){var eq=getMejorTerceroClas(D16SLOTS[slot]);if(eq)return eq;return"3° mejor ("+slot+")";}
  return resolverSlot(slot);
}
function calcClasificadoFase(pronos,fase,resMap,TODOS_arr){
  var reg=PTS[fase]||{};if(!reg.c)return 0;
  var equiposReales=[];
  TODOS_arr.filter(function(pa){return pa.f===fase;}).forEach(function(pa){
    var r=resMap[pa.id];
    if(r&&r.rl)equiposReales.push(r.rl.trim().toLowerCase());
    if(r&&r.rv)equiposReales.push(r.rv.trim().toLowerCase());
  });
  if(!equiposReales.length)return 0;
  function esNombreReal(s){return!!(s&&s.length>3&&!/^[0-9WL]/.test(s)&&s.indexOf("°")<0);}
  var equiposProno=[];
  TODOS_arr.filter(function(pa){return pa.f===fase;}).forEach(function(pa){
    var pr=pronos[pa.id];if(!pr||pr.gl==null)return;
    var slots=SLOTS[pa.id];if(!slots)return;
    var eL,eV;
    if(fase==="dieciseisavos"){eL=resolverSlot16Clas(slots[0]);eV=resolverSlot16Clas(slots[1]);}
    else{
      eL=resolverSlot(slots[0]);eV=resolverSlot(slots[1]);
      if(!esNombreReal(eL))eL=resolverSlot16Clas(slots[0]);
      if(!esNombreReal(eV))eV=resolverSlot16Clas(slots[1]);
    }
    if(esNombreReal(eL))equiposProno.push(eL.trim().toLowerCase());
    if(esNombreReal(eV))equiposProno.push(eV.trim().toLowerCase());
  });
  if(!equiposProno.length)return 0;
  var pts=0;
  equiposReales.forEach(function(eq){if(eq&&equiposProno.indexOf(eq)!==-1)pts+=reg.c;});
  return pts;
}

// Helper compartido: calcula clasS + clasF globales para un set de pronósticos
function calcClasExtraGlobal(pronos){
  var tot=0;
  // clasS: equipo de cuartos que pasa a semis
  (function(){
    var regS=PTS.semis;if(!regS.clasS)return;
    var gR=[];
    TODOS.filter(function(pa){return pa.f==="cuartos";}).forEach(function(pa){
      var r=res[pa.id];if(!r||r.gl==null)return;
      var rl=(r.rl||"").trim().toLowerCase(),rv=(r.rv||"").trim().toLowerCase();
      var gan=r.gl>r.gv?rl:r.gl<r.gv?rv:(r.penWin==="L"?rl:r.penWin==="V"?rv:"");
      if(gan)gR.push(gan);
    });
    var eP=[];
    TODOS.filter(function(pa){return pa.f==="cuartos";}).forEach(function(pa){
      var pr=pronos[pa.id];if(!pr)return;
      var pl=(pr.pl||"").trim().toLowerCase(),pv=(pr.pv||"").trim().toLowerCase();
      if(pl)eP.push(pl);if(pv)eP.push(pv);
    });
    gR.forEach(function(eq){if(eq&&eP.indexOf(eq)!==-1)tot+=regS.clasS;});
  })();
  // clasF: equipo de semis que llega a la final
  (function(){
    var regF=PTS.final;if(!regF.clasF)return;
    var gR=[];
    TODOS.filter(function(pa){return pa.f==="semis";}).forEach(function(pa){
      var r=res[pa.id];if(!r||r.gl==null)return;
      var rl=(r.rl||"").trim().toLowerCase(),rv=(r.rv||"").trim().toLowerCase();
      var gan=r.gl>r.gv?rl:r.gl<r.gv?rv:(r.penWin==="L"?rl:r.penWin==="V"?rv:"");
      if(gan)gR.push(gan);
    });
    var eP=[];
    TODOS.filter(function(pa){return pa.f==="semis";}).forEach(function(pa){
      var pr=pronos[pa.id];if(!pr)return;
      var pl=(pr.pl||"").trim().toLowerCase(),pv=(pr.pv||"").trim().toLowerCase();
      if(pl)eP.push(pl);if(pv)eP.push(pv);
    });
    gR.forEach(function(eq){if(eq&&eP.indexOf(eq)!==-1)tot+=regF.clasF;});
  })();
  return tot;
}

function calcTotal(p){
  var tot=0,exactos=0;var pronos=p.pronos||{};
  var GK=Object.keys(GEQ_G);
  TODOS.forEach(function(pa){
    var pr=pronos[pa.id],real=res[pa.id];
    var pts=calcP(pr,real,pa.f);
    if(pts!==null){tot+=pts;if(pr&&real&&pr.gl===real.gl&&pr.gv===real.gv)exactos++;}
  });
  ["dieciseisavos","octavos","cuartos","semis","final"].forEach(function(fase){tot+=calcClasificadoFase(pronos,fase,res,TODOS);});
  tot+=calcClasExtraGlobal(pronos);
  var hon=p.honor||{};
  HONOR_DEF.forEach(function(h){if(hR[h.k]&&hon[h.k]&&matchHonor(hon[h.k],hR[h.k]))tot+=h.pts;});
  GK.forEach(function(g){tot+=ptsGrupoPos(g,pronos);});
  return{pts:tot,exactos:exactos};
}

function countResults(){
  return Object.keys(res).filter(function(k){var r=res[k];return r&&r.gl!=null&&r.gv!=null;}).length;
}

async function load(){
  try{
    var [rawParts,rawRes,rawCfg]=await Promise.all([
      sbfetch("participantes?validado=eq.true&select=id,nombre,pronos,honor&order=nombre"),
      sbfetch("resultados?select=partido_id,gl,gv,local,visitante,pen_win"),
      sbfetch("config?clave=eq.honor_real&select=valor")
    ]);
    res={};
    rawRes.forEach(function(r){res[r.partido_id]={gl:r.gl,gv:r.gv,rl:r.local||"",rv:r.visitante||"",penWin:r.pen_win||null};});
    hR={};
    if(rawCfg&&rawCfg[0]){try{hR=JSON.parse(rawCfg[0].valor)||{};}catch(e){}}
    parts=rawParts.map(function(p){
      var c=calcTotal(p);return Object.assign({},p,{pts:c.pts,exactos:c.exactos});
    }).sort(function(a,b){return b.pts-a.pts||b.exactos-a.exactos;});
    render();updateLiveText(true);
  }catch(e){
    var msg=e&&e.message?e.message:"Error desconocido";
    var detalle="";
    if(msg.indexOf("503")>=0||msg.indexOf("502")>=0){detalle="<br><span style='font-size:11px;opacity:.8'>Supabase pausado. Entra a supabase.com y reactiva el proyecto (~1 min).</span>";}
    else if(msg.indexOf("Failed to fetch")>=0){detalle="<br><span style='font-size:11px;opacity:.8'>Sin conexión. Verifica que Supabase esté activo.</span>";}
    document.getElementById("main").innerHTML='<div class="err-box">⚠️ <b>'+msg+'</b>'+detalle+'<br><br><button onclick="load()" style="margin-top:.25rem;background:#C8102E;color:#fff;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:12px">↺ Reintentar</button></div>';
    updateLiveText(false);
  }
}

function descargarPDF(pid){
  var btn=document.getElementById("btnpdf_"+pid);
  if(btn){btn.textContent="Generando…";btn.disabled=true;}
  if(typeof window.jspdf==="undefined"){
    var s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    s.onload=function(){construirPDFClas(pid);};
    document.head.appendChild(s);

}

function limpiarN(n){
  if(!n)return"";
  var s=n.replace(/[\u{1F300}-\u{1FFFF}]|[\u{1F100}-\u{1F1FF}]|[\u2600-\u27FF]/gu,"");
  s=s.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  s=s.replace(/\u00f1/g,"n").replace(/\u00d1/g,"N");
  s=s.replace(/[\u0080-\u00ff]/g,function(c){
    var map={"ü":"u","Ü":"U","ö":"o","Ö":"O","ä":"a","Ä":"A","ø":"o","å":"a","æ":"ae","Æ":"AE"};
    return map[c]||c.normalize("NFD").replace(/[\u0300-\u036f]/g,"")||"?";
  });
  return s.replace(/\s+/g," ").trim();
}
