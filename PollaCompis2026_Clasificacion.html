function statsDePartidos(equipos,pids,getReal){
  var st={};equipos.forEach(function(e){st[e]={pts:0,dg:0,gf:0};});
  pids.forEach(function(pid){
    var pa=TODOS.find(function(p){return p.id===pid;});if(!pa)return;
    if(equipos.indexOf(pa.l)<0||equipos.indexOf(pa.v)<0)return;
    var r=getReal(pid);if(!r||r.gl==null||r.gv==null)return;
    st[pa.l].gf+=r.gl;st[pa.l].dg+=(r.gl-r.gv);
    st[pa.v].gf+=r.gv;st[pa.v].dg+=(r.gv-r.gl);
    if(r.gl>r.gv)st[pa.l].pts+=3;else if(r.gl<r.gv)st[pa.v].pts+=3;
    else{st[pa.l].pts+=1;st[pa.v].pts+=1;}
  });
  return st;
}
function resolverGlobalDesempate(equipos,statsGlobal){
  return equipos.slice().sort(function(a,b){
    var sa=statsGlobal[a],sb=statsGlobal[b];
    if(sb.dg!==sa.dg)return sb.dg-sa.dg;
    if(sb.gf!==sa.gf)return sb.gf-sa.gf;
    var gca=sa.gf-sa.dg,gcb=sb.gf-sb.dg;
    if(gca!==gcb)return gca-gcb;
    return a.localeCompare(b);
  });
}
// Artículo 13 (Mundial 2026): entre equipos empatados en puntos, el head-to-head
// (puntos, luego DG, luego GF — solo de los partidos entre ellos) va ANTES que las
// estadísticas globales. Si tras el H2H sigue habiendo empate sin reducir el grupo,
// se cae a estadísticas globales; si se reduce, se vuelve a aplicar H2H recursivamente.
function resolverH2H(equipos,pids,statsGlobal,getReal){
  if(equipos.length<=1)return equipos.slice();
  var h2h=statsDePartidos(equipos,pids,getReal);
  var porPts={};
  equipos.forEach(function(e){var k=h2h[e].pts;if(!porPts[k])porPts[k]=[];porPts[k].push(e);});
  var clavesPts=Object.keys(porPts).map(Number).sort(function(a,b){return b-a;});
  var resultado=[];
  clavesPts.forEach(function(k){
    var grupo=porPts[k];
    if(grupo.length===1){resultado.push(grupo[0]);return;}
    var porDgGf={};
    grupo.forEach(function(e){var key=h2h[e].dg+"_"+h2h[e].gf;if(!porDgGf[key])porDgGf[key]=[];porDgGf[key].push(e);});
    var clavesDg=Object.keys(porDgGf).sort(function(ka,kb){
      var pa2=ka.split("_").map(Number),pb2=kb.split("_").map(Number);
      if(pb2[0]!==pa2[0])return pb2[0]-pa2[0];
      return pb2[1]-pa2[1];
    });
    clavesDg.forEach(function(key){
      var sub=porDgGf[key];
      if(sub.length===1){resultado.push(sub[0]);return;}
      if(sub.length===equipos.length){
        resultado=resultado.concat(resolverGlobalDesempate(sub,statsGlobal));
      }else{
        resultado=resultado.concat(resolverH2H(sub,pids,statsGlobal,getReal));
      }
    });
  });
  return resultado;
}

function sortGrupo(equipos,stats){
  return equipos.slice().sort(function(a,b){
    var sa=stats[a],sb=stats[b];
    if(sb.pts!==sa.pts)return sb.pts-sa.pts;
    if(sb.dg!==sa.dg)return sb.dg-sa.dg;
    if(sb.gf!==sa.gf)return sb.gf-sa.gf;
    var gca=sa.gf-sa.dg,gcb=sb.gf-sb.dg;
    if(gca!==gcb)return gca-gcb;
    return a.localeCompare(b);
  });
}

    if(r.gl>r.gv)s[pa.l].pts+=3;else if(r.gl<r.gv)s[pa.v].pts+=3;else{s[pa.l].pts+=1;s[pa.v].pts+=1;}

  eq.forEach(function(e){var k=s[e].pts;if(!porPts[k])porPts[k]=[];porPts[k].push(e);});

function ptsGrupoPos(g,pronos){

  if(!pids.every(function(pid){var r=res[pid];return r&&r.gl!=null&&r.gv!=null;}))return 0;

function calcP(pr,real,fase){
  if(!pr)return null;
  var reg=PTS[fase]||PTS.grupos;var t=0;
  if(fase==="grupos"){
    if(!real||real.gl==null||pr.gl==null)return null;
    var sR=real.gl>real.gv?"L":real.gl<real.gv?"V":"X";
    var sP=pr.gl>pr.gv?"L":pr.gl<pr.gv?"V":"X";
    if(sR===sP)t+=reg.s;if(real.gl===pr.gl&&real.gv===pr.gv)t+=reg.e;
    return t;
  }
  if(!real)return null;
  var rl=(real.rl||"").trim().toLowerCase(),rv=(real.rv||"").trim().toLowerCase();
  var pl=(pr.pl||"").trim().toLowerCase(),pv=(pr.pv||"").trim().toLowerCase();
  var tenemosEq=(rl!==""&&rv!==""),tenemosP=(pl!==""&&pv!=="");
  var cruceEx=tenemosEq&&tenemosP&&(rl===pl&&rv===pv);
  // Bono de cruce exacto: depende solo de los nombres reales, se otorga aunque
  // el partido aún no se haya jugado.
  if(cruceEx&&reg.x)t+=reg.x;
  if(real.gl==null||pr.gl==null)return t;
  if(cruceEx){
    var sR2=real.gl>real.gv?"L":real.gl<real.gv?"V":"X";
    var sP2=pr.gl>pr.gv?"L":pr.gl<pr.gv?"V":"X";
    if(sR2===sP2)t+=reg.s;if(real.gl===pr.gl&&real.gv===pr.gv)t+=reg.e;
  }else if(!tenemosEq){
    var sR3=real.gl>real.gv?"L":real.gl<real.gv?"V":"X";
    var sP3=pr.gl>pr.gv?"L":pr.gl<pr.gv?"V":"X";
    if(sR3===sP3)t+=reg.s;if(real.gl===pr.gl&&real.gv===pr.gv)t+=reg.e;
  }
  return t;
}

      if(gan)gR.push(gan);
    });

      if(pl)eP.push(pl);if(pv)eP.push(pv);
    });
    gR.forEach(function(eq){if(eq&&eP.indexOf(eq)!==-1)tot+=regS.clasS;});
  })();
  // clasF: equipo de semis que llega a la final
  (function(){
    var regF=PTS.final;if(!regF.clasF)return;
    var gR=[];
    TODOS.filter(function(pa){return pa.f==="semis";}).forEach(function(pa){
      var r=res[pa.id];if(!r||r.gl==null)return;
      var rl=(r.rl||"").trim().toLowerCase(),rv=(r.rv||"").trim().toLowerCase();

      if(gan)gR.push(gan);
    });
    var eP=[];

    });
    gR.forEach(function(eq){if(eq&&eP.indexOf(eq)!==-1)tot+=regF.clasF;});

}

function calcTotal(p){
  var tot=0,exactos=0;var pronos=p.pronos||{};
  var GK=Object.keys(GEQ_G);
  TODOS.forEach(function(pa){
    var pr=pronos[pa.id],real=res[pa.id];
    var pts=calcP(pr,real,pa.f);
    if(pts!==null){tot+=pts;if(pr&&real&&pr.gl===real.gl&&pr.gv===real.gv)exactos++;}
  });
  ["dieciseisavos","octavos","cuartos","semis","final"].forEach(function(fase){tot+=calcClasificadoFase(pronos,fase,res,TODOS);});
  tot+=calcClasExtraGlobal(pronos);
  var hon=p.honor||{};
  HONOR_DEF.forEach(function(h){if(hR[h.k]&&hon[h.k]&&matchHonor(hon[h.k],hR[h.k]))tot+=h.pts;});
  GK.forEach(function(g){tot+=ptsGrupoPos(g,pronos);});
  return{pts:tot,exactos:exactos};
}

function countResults(){
  return Object.keys(res).filter(function(k){var r=res[k];return r&&r.gl!=null&&r.gv!=null;}).length;
}

// ============================================================
// CARGAR DATOS
// ============================================================
async function load(){
  try{
    var [rawParts,rawRes,rawCfg]=await Promise.all([
      sbfetch("participantes?validado=eq.true&select=id,nombre,pronos,honor&order=nombre"),
      sbfetch("resultados?select=partido_id,gl,gv,local,visitante,pen_win"),
      sbfetch("config?clave=eq.honor_real&select=valor")
    ]);
    res={};
    rawRes.forEach(function(r){res[r.partido_id]={gl:r.gl,gv:r.gv,rl:r.local||"",rv:r.visitante||"",penWin:r.pen_win||null};});
    hR={};
    if(rawCfg&&rawCfg[0]){try{hR=JSON.parse(rawCfg[0].valor)||{};}catch(e){}}
    parts=rawParts.map(function(p){
      var c=calcTotal(p);return Object.assign({},p,{pts:c.pts,exactos:c.exactos});
    }).sort(function(a,b){return b.pts-a.pts||b.exactos-a.exactos;});
    render();updateLiveText(true);
  }catch(e){
    var msg=e&&e.message?e.message:"Error desconocido";
    var detalle="";
    if(msg.indexOf("503")>=0||msg.indexOf("502")>=0){detalle="<br><span style='font-size:11px;opacity:.8'>Supabase pausado. Entra a supabase.com y reactiva el proyecto (~1 min).</span>";}
    else if(msg.indexOf("Failed to fetch")>=0){detalle="<br><span style='font-size:11px;opacity:.8'>Sin conexión. Verifica que Supabase esté activo.</span>";}
    document.getElementById("main").innerHTML='<div class="err-box">⚠️ <b>'+msg+'</b>'+detalle+'<br><br><button onclick="load()" style="margin-top:.25rem;background:#C8102E;color:#fff;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:12px">↺ Reintentar</button></div>';
    updateLiveText(false);
  }
}

}

function descargarPDF(pid){
  var btn=document.getElementById("btnpdf_"+pid);
  if(btn){btn.textContent="Generando…";btn.disabled=true;}
  if(typeof window.jspdf==="undefined"){
    var s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    s.onload=function(){construirPDFOriginal(pid);};
    document.head.appendChild(s);
  }else{construirPDFOriginal(pid);}
}

function limpiarN(n){
  if(!n)return"";
  var s=n.replace(/[\u{1F300}-\u{1FFFF}]|[\u{1F100}-\u{1F1FF}]|[\u2600-\u27FF]/gu,"");
  s=s.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  s=s.replace(/\u00f1/g,"n").replace(/\u00d1/g,"N");
  s=s.replace(/[\u0080-\u00ff]/g,function(c){
    var map={"ü":"u","Ü":"U","ö":"o","Ö":"O","ä":"a","Ä":"A","ø":"o","å":"a","æ":"ae","Æ":"AE"};
    return map[c]||c.normalize("NFD").replace(/[\u0300-\u036f]/g,"")||"?";
  });
  return s.replace(/\s+/g," ").trim();
}

// ============================================================
// PDF ORIGINAL — réplica exacta del comprobante que el participante
// descargó al inscribirse (solo sus pronósticos, sin resultados reales)
// ============================================================
function clasGrupoPDF(g,pronos){
  var eq=GEQ_G[g];
  var stats={};
  eq.forEach(function(e){stats[e]={pts:0,dg:0,gf:0};});
  TODOS.filter(function(pa){return pa.f==="grupos"&&pa.g===g;}).forEach(function(pa){
    var pr=pronos[pa.id];if(!pr||pr.gl==null||pr.gv==null)return;
    var gl=parseInt(pr.gl),gv=parseInt(pr.gv);if(isNaN(gl)||isNaN(gv))return;
    stats[pa.l].gf+=gl;stats[pa.l].dg+=(gl-gv);
    stats[pa.v].gf+=gv;stats[pa.v].dg+=(gv-gl);
    if(gl>gv)stats[pa.l].pts+=3;else if(gl<gv)stats[pa.v].pts+=3;
    else{stats[pa.l].pts+=1;stats[pa.v].pts+=1;}
  });
  return{orden:sortGrupo(eq,stats),stats:stats};
}
function obtenerMejoresTercerosPDF(pronos){
  var terceros=[];
  Object.keys(GEQ_G).forEach(function(g){
    var r=clasGrupoPDF(g,pronos);var eq=r.orden[2];var st=r.stats[eq];
    terceros.push({equipo:eq,grupo:g,pts:st.pts,dg:st.dg,gf:st.gf});
  });
  terceros.sort(function(a,b){
    if(b.pts!==a.pts)return b.pts-a.pts;
    if(b.dg!==a.dg)return b.dg-a.dg;
    if(b.gf!==a.gf)return b.gf-a.gf;
    return a.equipo.localeCompare(b.equipo);
  });
  return terceros;
}
function getMejorTerceroPDF(pid,pronos){
  var top8=obtenerMejoresTercerosPDF(pronos).slice(0,8);
  if(top8.length<8)return null;
  var clave=top8.map(function(t){return t.grupo;}).sort().join("");
  var combo=COMBOS[clave];if(!combo)return null;
  var g=combo[pid];if(!g)return null;
  var t=top8.find(function(x){return x.grupo===g;});
  return t?t.equipo:null;
}
function resolveCodPDF(cod,pronos){
  if(!cod)return"";
  var m1=cod.match(/^([1-4])([A-L])$/);
  if(m1){var pos=parseInt(m1[1])-1,g=m1[2];var r=clasGrupoPDF(g,pronos);return r.orden[pos]||cod;}
  if(D16SLOTS[cod]!==undefined){var eq=getMejorTerceroPDF(D16SLOTS[cod],pronos);if(eq)return eq;return"3 Mejor ("+cod+")";}
  var mw=cod.match(/^W([0-9]+)$/);
  if(mw){var pidn=parseInt(mw[1]);var pr=pronos[pidn];
    if(pr&&pr.pl&&pr.gl!=null&&pr.gv!=null){
      if(pr.gl>pr.gv)return pr.pl;if(pr.gl<pr.gv)return pr.pv;
      if(pr.penWin==="L")return pr.pl;if(pr.penWin==="V")return pr.pv;return pr.pl;
    }return cod;}
  var ml=cod.match(/^L([0-9]+)$/);
  if(ml){var pidn2=parseInt(ml[1]);var pr2=pronos[pidn2];
    if(pr2&&pr2.pl&&pr2.gl!=null&&pr2.gv!=null){
      if(pr2.gl>pr2.gv)return pr2.pv;if(pr2.gl<pr2.gv)return pr2.pl;
      if(pr2.penWin==="L")return pr2.pv;if(pr2.penWin==="V")return pr2.pl;return pr2.pv;
    }return cod;}
  return cod;
}
