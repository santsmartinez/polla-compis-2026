async function load(){
  var liEl=document.getElementById("li");
  if(liEl)liEl.innerHTML="<p style='font-size:13px;color:#888;padding:8px 0'>⏳ Cargando datos desde Supabase…</p>";
  try{
    var respP=await sbfetch("participantes?order=creado_en.asc&select=*");
    if(!respP.ok){var errTxt=await respP.text();throw new Error("Supabase /participantes — HTTP "+respP.status+": "+errTxt.slice(0,200));}
    var rP=await respP.json();
    var respR=await sbfetch("resultados?select=*");
    if(!respR.ok){var errTxt2=await respR.text();throw new Error("Supabase /resultados — HTTP "+respR.status+": "+errTxt2.slice(0,200));}
    var rR=await respR.json();
    var respH=await sbfetch("config?clave=eq.honor_real&select=valor");
    if(!respH.ok){var errTxt3=await respH.text();throw new Error("Supabase /config — HTTP "+respH.status+": "+errTxt3.slice(0,200));}
    var rH=await respH.json();
    parts=Array.isArray(rP)?rP:[];
    res={};
    if(Array.isArray(rR))rR.forEach(function(r){
      res[r.partido_id]={gl:r.gl,gv:r.gv,rl:r.local||"",rv:r.visitante||"",penWin:r.pen_win||null};
    });
    if(rH&&rH[0])try{hR=JSON.parse(rH[0].valor);}catch(e){hR={};}
    var prevErr=document.getElementById("load-err");
    if(prevErr)prevErr.remove();
    rendSt();rendLi();bFB();rendRF();rendHF();
  }catch(e){
    console.error("Error cargando datos:",e);
    var errBox=document.getElementById("load-err");
    if(!errBox){
      errBox=document.createElement("div");
      errBox.id="load-err";
      errBox.style.cssText="background:#FFEBEE;border:1px solid #FFCDD2;border-radius:10px;padding:1rem;margin-bottom:.75rem;font-size:13px;color:#B71C1C;line-height:1.7";
      var bodyEl=document.querySelector(".body");
      if(bodyEl)bodyEl.insertBefore(errBox,bodyEl.firstChild);
    }
    var esProblemaSupabase=(e.message&&(e.message.indexOf("503")>=0||e.message.indexOf("Failed to fetch")>=0||e.message.indexOf("NetworkError")>=0||e.message.indexOf("404")>=0));
    errBox.innerHTML=
      "<b>⚠️ Error al cargar datos</b><br>"+
      "<span style='color:#555;font-size:12px'>"+escHtml(e.message)+"</span><br><br>"+
      (esProblemaSupabase?
        "<b>Posible causa:</b> El proyecto de Supabase puede estar <b>pausado por inactividad</b> (se pausa tras 7 días sin uso).<br>"+
        "→ Ve a <a href='https://supabase.com' target='_blank' style='color:#C8102E'>supabase.com</a>, inicia sesión, abre el proyecto <b>polla-compis-2026</b> y espera que reactive (1-2 min).<br>":
        "<b>Posible causa:</b> Sin conexión a internet o error en la URL de Supabase.<br>")+
      "<button onclick='load()' style='margin-top:8px;padding:7px 18px;background:#C8102E;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer'>↺ Reintentar</button>";
    parts=[];
    rendSt();rendLi();
  }
}

function escHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function rendLi(){

  if(!parts.length){el.innerHTML="<p style='font-size:13px;color:#888'>Nadie ha enviado su polla aún.</p>";return;}
  el.innerHTML="";
  parts.forEach(function(p,i){
    var row=document.createElement("div");row.className="prow2";
    var num=document.createElement("span");num.style.cssText="font-size:12px;color:#AAA;width:18px";num.textContent=i+1;
    var nom=document.createElement("div");nom.className="pn";nom.textContent=p.nombre;

    var pil=document.createElement("span");pil.className="pill "+(p.validado?"pok":"ppen");pil.textContent=p.validado?"✓ Validado":"Pendiente";

  await sbfetch("participantes?id=eq."+id,{method:"DELETE",headers:{"Prefer":"return=minimal"}});
  await load();

function calcMiniStats(equipos,pids,resMap,TODOS_arr){
  var ms={};equipos.forEach(function(e){ms[e]={pts:0,dg:0,gf:0};});
  pids.forEach(function(pid){
    var r=resMap[pid];if(!r||r.gl==null||r.gv==null)return;
    var pa=TODOS_arr.find(function(p){return p.id===pid;});if(!pa)return;
    if(equipos.indexOf(pa.l)<0||equipos.indexOf(pa.v)<0)return;
    ms[pa.l].gf+=r.gl;ms[pa.l].dg+=(r.gl-r.gv);
    ms[pa.v].gf+=r.gv;ms[pa.v].dg+=(r.gv-r.gl);
    if(r.gl>r.gv)ms[pa.l].pts+=3;else if(r.gl<r.gv)ms[pa.v].pts+=3;
    else{ms[pa.l].pts+=1;ms[pa.v].pts+=1;}
  });return ms;
}
function rankSubgrupo(sub,allStats,pids,resMap,TODOS_arr,esStep2){
  if(sub.length===1)return sub;
  var ms=calcMiniStats(sub,pids,resMap,TODOS_arr);
  function gbv(arr,fn){var m={};arr.forEach(function(e){var k=fn(e);if(!m[k])m[k]=[];m[k].push(e);});return m;}
  var result=[];
  var byPts=gbv(sub,function(e){return ms[e].pts;});
  Object.keys(byPts).map(Number).sort(function(a,b){return b-a;}).forEach(function(pv){
    var g=byPts[pv];if(g.length===1){result=result.concat(g);return;}
    var byDg=gbv(g,function(e){return ms[e].dg;});
    Object.keys(byDg).map(Number).sort(function(a,b){return b-a;}).forEach(function(dv){
      var gd=byDg[dv];if(gd.length===1){result=result.concat(gd);return;}
      var byGf=gbv(gd,function(e){return ms[e].gf;});
      Object.keys(byGf).map(Number).sort(function(a,b){return b-a;}).forEach(function(gfv){
        var gg=byGf[gfv];if(gg.length===1){result=result.concat(gg);return;}
        if(!esStep2&&gg.length<sub.length){result=result.concat(rankSubgrupo(gg,allStats,pids,resMap,TODOS_arr,true));return;}
        var byGdg=gbv(gg,function(e){return allStats[e].dg;});
        Object.keys(byGdg).map(Number).sort(function(a,b){return b-a;}).forEach(function(gdv){
          var ggd=byGdg[gdv];if(ggd.length===1){result=result.concat(ggd);return;}
          var byGgf=gbv(ggd,function(e){return allStats[e].gf;});
          Object.keys(byGgf).map(Number).sort(function(a,b){return b-a;}).forEach(function(ggfv){
            result=result.concat(byGgf[ggfv].slice().sort());
          });
        });
      });
    });
  });return result;
}
function fifaSortGrupo(equipos,allStats,pids,resMap,TODOS_arr){
  function gbv(arr,fn){var m={};arr.forEach(function(e){var k=fn(e);if(!m[k])m[k]=[];m[k].push(e);});return m;}
  var byPts=gbv(equipos,function(e){return allStats[e].pts;});
  var result=[];
  Object.keys(byPts).map(Number).sort(function(a,b){return b-a;}).forEach(function(pv){
    var g=byPts[pv];
    if(g.length===1)result=result.concat(g);
    else result=result.concat(rankSubgrupo(g,allStats,pids,resMap,TODOS_arr,false));
  });
  return result;
}
function clasGrupoReal(g){
  var eq=GEQ_G[g];var stats={};
  eq.forEach(function(e){stats[e]={pts:0,dg:0,gf:0};});
  GPIDS_G[g].forEach(function(pid){
    var r=res[pid];if(!r||r.gl==null||r.gv==null)return;
    var pa=TODOS.find(function(p){return p.id===pid;});if(!pa)return;
    stats[pa.l].gf+=r.gl;stats[pa.l].dg+=(r.gl-r.gv);
    stats[pa.v].gf+=r.gv;stats[pa.v].dg+=(r.gv-r.gl);
    if(r.gl>r.gv)stats[pa.l].pts+=3;else if(r.gl<r.gv)stats[pa.v].pts+=3;
    else{stats[pa.l].pts+=1;stats[pa.v].pts+=1;}
  });
  var resW={};GPIDS_G[g].forEach(function(pid){if(res[pid])resW[pid]=res[pid];});
  return fifaSortGrupo(eq,stats,GPIDS_G[g],resW,TODOS);
}

function clasGrupoProno(g,pronos){
  var eq=GEQ_G[g];var stats={};
  eq.forEach(function(e){stats[e]={pts:0,dg:0,gf:0};});
  GPIDS_G[g].forEach(function(pid){
    var pr=pronos[pid];if(!pr||pr.gl==null||pr.gv==null)return;
    var pa=TODOS.find(function(p){return p.id===pid;});if(!pa)return;
    stats[pa.l].gf+=pr.gl;stats[pa.l].dg+=(pr.gl-pr.gv);
    stats[pa.v].gf+=pr.gv;stats[pa.v].dg+=(pr.gv-pr.gl);
    if(pr.gl>pr.gv)stats[pa.l].pts+=3;else if(pr.gl<pr.gv)stats[pa.v].pts+=3;
    else{stats[pa.l].pts+=1;stats[pa.v].pts+=1;}
  });
  var pronosW={};GPIDS_G[g].forEach(function(pid){if(pronos[pid])pronosW[pid]=pronos[pid];});
  return fifaSortGrupo(eq,stats,GPIDS_G[g],pronosW,TODOS);
}

function ptsGrupoPos(g,pronos){
  var pids=GPIDS_G[g];
  var completo=pids.every(function(pid){var r=res[pid];return r&&r.gl!=null&&r.gv!=null;});
  if(!completo)return 0;
  var pronoCompleto=pids.every(function(pid){var pr=pronos[pid];return pr&&pr.gl!=null&&pr.gv!=null;});
  if(!pronoCompleto)return 0;
  var real=clasGrupoReal(g);
  var prono=clasGrupoProno(g,pronos);
  var pts=0;
  for(var i=0;i<4;i++){if(real[i]===prono[i])pts+=2;}
  return pts;
}

function calcP(pr,real,fase){
  if(!real||real.gl==null||!pr||pr.gl==null)return null;
  var reg=PTS[fase]||PTS.grupos;
  var t=0;
  if(fase==="grupos"){
    var sR=real.gl>real.gv?"L":real.gl<real.gv?"V":"X";
    var sP=pr.gl>pr.gv?"L":pr.gl<pr.gv?"V":"X";
    if(sR===sP)t+=reg.s;
    if(real.gl===pr.gl&&real.gv===pr.gv)t+=reg.e;
  }else{
    var rl=(real.rl||"").trim().toLowerCase();
    var rv=(real.rv||"").trim().toLowerCase();
    var pl=(pr.pl||"").trim().toLowerCase();
    var pv=(pr.pv||"").trim().toLowerCase();
    var tenemosEquipos=(rl!==""&&rv!=="");
    var tenemosProno=(pl!==""&&pv!=="");
    var cruceExacto=false;
    if(tenemosEquipos&&tenemosProno){cruceExacto=(rl===pl&&rv===pv);}
    if(cruceExacto){
      var sR2=real.gl>real.gv?"L":real.gl<real.gv?"V":"X";
      var sP2=pr.gl>pr.gv?"L":pr.gl<pr.gv?"V":"X";
      if(reg.x)t+=reg.x;
      if(sR2===sP2)t+=reg.s;
      if(real.gl===pr.gl&&real.gv===pr.gv)t+=reg.e;
    }else if(!tenemosEquipos){
      var sR3=real.gl>real.gv?"L":real.gl<real.gv?"V":"X";
      var sP3=pr.gl>pr.gv?"L":pr.gl<pr.gv?"V":"X";
      if(sR3===sP3)t+=reg.s;
      if(real.gl===pr.gl&&real.gv===pr.gv)t+=reg.e;
    }
  }
  return t;
}

function verD(id){

  var fMap={};
  TODOS.forEach(function(pa){if(!fMap[pa.f])fMap[pa.f]=[];fMap[pa.f].push(pa);});
  var GK=["A","B","C","D","E","F","G","H","I","J","K","L"];
  var totalPts=0,totalExactos=0;
  var ptsPorFase={};fo.forEach(function(f){ptsPorFase[f]=0;});
  var ptsHonor=0,ptsPosGrupo=0;
  TODOS.forEach(function(pa){
    var pr=pronos[pa.id],real=res[pa.id];
    var pts=calcP(pr,real,pa.f);
    if(pts!==null&&pts>0){ptsPorFase[pa.f]=(ptsPorFase[pa.f]||0)+pts;totalPts+=pts;}
    if(pr&&real&&pr.gl===real.gl&&pr.gv===real.gv)totalExactos++;
  });
  (function(){var regS=PTS.semis;if(!regS.clasS)return;
    var gR=[];TODOS.filter(function(pa){return pa.f==="cuartos";}).forEach(function(pa){
      var r=res[pa.id];if(!r||r.gl==null)return;
      var rl=(r.rl||"").trim().toLowerCase(),rv=(r.rv||"").trim().toLowerCase();
      var g=r.gl>r.gv?rl:r.gl<r.gv?rv:(r.penWin==="L"?rl:r.penWin==="V"?rv:"");
      if(g)gR.push(g);});
    var eP=[];TODOS.filter(function(pa){return pa.f==="cuartos";}).forEach(function(pa){
      var pr=pronos[pa.id];if(!pr)return;
      var pl=(pr.pl||"").trim().toLowerCase(),pv=(pr.pv||"").trim().toLowerCase();
      if(pl)eP.push(pl);if(pv)eP.push(pv);});
    gR.forEach(function(eq){if(eq&&eP.indexOf(eq)!==-1){totalPts+=regS.clasS;ptsPorFase["semis"]=(ptsPorFase["semis"]||0)+regS.clasS;}});
  })();
  (function(){var regF=PTS.final;if(!regF.clasF)return;
    var gR=[];TODOS.filter(function(pa){return pa.f==="semis";}).forEach(function(pa){
      var r=res[pa.id];if(!r||r.gl==null)return;
      var rl=(r.rl||"").trim().toLowerCase(),rv=(r.rv||"").trim().toLowerCase();
      var g=r.gl>r.gv?rl:r.gl<r.gv?rv:(r.penWin==="L"?rl:r.penWin==="V"?rv:"");
      if(g)gR.push(g);});

      var pr=pronos[pa.id];if(!pr)return;
      var pl=(pr.pl||"").trim().toLowerCase(),pv=(pr.pv||"").trim().toLowerCase();
      if(pl)eP.push(pl);if(pv)eP.push(pv);});
    gR.forEach(function(eq){if(eq&&eP.indexOf(eq)!==-1){totalPts+=regF.clasF;ptsPorFase["final"]=(ptsPorFase["final"]||0)+regF.clasF;}});
  })();
  (function(){
    ["dieciseisavos","octavos","cuartos","semis","final"].forEach(function(fase){
      var pts=calcClasificadoFase(pronos,fase);
      totalPts+=pts;

    });
  })();

    if(hR[h.k]&&honor[h.k]&&matchHonor(honor[h.k],hR[h.k])){ptsHonor+=h.pts;totalPts+=h.pts;}
  });
  GK.forEach(function(g){
    var pp=ptsGrupoPos(g,pronos);

function getMejorTerceroParaPartido16(pid){
  var terceros=[];
  var GK2=["A","B","C","D","E","F","G","H","I","J","K","L"];
  GK2.forEach(function(g){
    var clas=clasGrupoReal(g);
    if(clas.length<3)return;
    var eq=clas[2];
    var stats={pts:0,dg:0,gf:0};
    GPIDS_G[g].forEach(function(id2){
      var r=res[id2];if(!r||r.gl==null)return;
      var pa=TODOS.find(function(p){return p.id===id2;});if(!pa)return;
      var l=pa.l,v=pa.v,gl=r.gl,gv=r.gv;
      if(l===eq){stats.gf+=gl;stats.dg+=(gl-gv);stats.pts+=(gl>gv?3:gl===gv?1:0);}
      if(v===eq){stats.gf+=gv;stats.dg+=(gv-gl);stats.pts+=(gv>gl?3:gv===gl?1:0);}
    });
    terceros.push({equipo:eq,grupo:g,pts:stats.pts,dg:stats.dg,gf:stats.gf});
  });
  terceros.sort(function(a,b){
    if(b.pts!==a.pts)return b.pts-a.pts;
    if(b.dg!==a.dg)return b.dg-a.dg;
    if(b.gf!==a.gf)return b.gf-a.gf;
    return a.equipo.localeCompare(b.equipo);
  });
  var top8=terceros.slice(0,8);
  if(top8.length<8)return null;
  var clave=top8.map(function(t){return t.grupo;}).sort().join("");
  var combo=COMBOS[clave];
  if(!combo)return null;
  var g=combo[pid];
  if(!g)return null;
  var t=top8.find(function(x){return x.grupo===g;});
  return t?t.equipo:null;
}

function resolverSlot16(slot){
  if(!slot)return"";
  var m1=slot.match(/^([12])([A-L])$/);
  if(m1){
    var pos=parseInt(m1[1])-1,g=m1[2];
    var clas=clasGrupoReal(g);
    return clas[pos]||slot;
  }
  if(D16SLOTS[slot]!==undefined){
    var eq=getMejorTerceroParaPartido16(D16SLOTS[slot]);
    if(eq)return eq;
    return "3° mejor ("+slot+")";
  }
  return resolverSlot(slot);
}

function nomPartido16(partido){
  return{l:resolverSlot16(partido.l)||partido.l,v:resolverSlot16(partido.v)||partido.v};
}

function htmlTablaGrupo(g){
  var eq=GEQ_G[g];
  var stats={};
  eq.forEach(function(e){stats[e]={pts:0,dg:0,gf:0,pj:0};});
  GPIDS_G[g].forEach(function(pid){
    var r=res[pid];if(!r||r.gl==null||r.gv==null)return;
    var pa=TODOS.find(function(p){return p.id===pid;});if(!pa)return;
    var l=pa.l,v=pa.v,gl=r.gl,gv=r.gv;
    stats[l].pj++;stats[v].pj++;
    stats[l].gf+=gl;stats[l].dg+=(gl-gv);
    stats[v].gf+=gv;stats[v].dg+=(gv-gl);
    if(gl>gv)stats[l].pts+=3;else if(gl<gv)stats[v].pts+=3;
    else{stats[l].pts+=1;stats[v].pts+=1;}
  });
  var sorted=eq.slice().sort(function(a,b){
    if(stats[b].pts!==stats[a].pts)return stats[b].pts-stats[a].pts;
    if(stats[b].dg!==stats[a].dg)return stats[b].dg-stats[a].dg;
    if(stats[b].gf!==stats[a].gf)return stats[b].gf-stats[a].gf;

  });
  var h="<table style='width:100%;border-collapse:collapse;font-size:11px;margin-top:4px'>";

  sorted.forEach(function(eq2,i){
    var s=stats[eq2];
    var bg=i<2?"#E8F5E9":i===2?"#FFF8E1":"#FFF";
    var pts_color=i<2?"#1B5E20":i===2?"#E65100":"#888";
    h+="<tr style='background:"+bg+";border-bottom:1px solid #EEE'>";
    h+="<td style='padding:3px 4px;font-weight:700;color:"+pts_color+";text-align:center'>"+(i+1)+"</td>";
    h+="<td style='padding:3px 4px;font-weight:"+(i<2?"600":"400")+"'>"+eq2+"</td>";
    h+="<td style='padding:3px 4px;text-align:center;color:#888'>"+s.pj+"</td>";
    h+="<td style='padding:3px 4px;text-align:center;font-weight:700;color:"+pts_color+"'>"+s.pts+"</td>";
    h+="<td style='padding:3px 4px;text-align:center;color:#555'>"+(s.dg>0?"+":"")+s.dg+"</td>";
    h+="<td style='padding:3px 4px;text-align:center;color:#555'>"+s.gf+"</td>";
    h+="</tr>";
  });
  h+="</table>";
  return h;
}

function calcClasificadoFase(pronos,fase){
  var reg=PTS[fase]||{};
  if(!reg.c)return 0;
  var equiposReales=[];
  TODOS.filter(function(pa){return pa.f===fase;}).forEach(function(pa){
    var r=res[pa.id];
    if(r&&r.rl)equiposReales.push(r.rl.trim().toLowerCase());
    if(r&&r.rv)equiposReales.push(r.rv.trim().toLowerCase());
  });
  if(!equiposReales.length)return 0;
  // El participante guardó slots ("1E","W73") no nombres reales
  // Resolverlos con los resultados del Admin para poder comparar
  function esNombreReal(s){return!!(s&&s.length>3&&!/^[0-9WL]/.test(s)&&s.indexOf("°")<0);}
  var equiposProno=[];
  TODOS.filter(function(pa){return pa.f===fase;}).forEach(function(pa){
    var pr=pronos[pa.id];if(!pr||pr.gl==null)return;
    var slots=SLOTS[pa.id];if(!slots)return;
    var eL,eV;
    if(fase==="dieciseisavos"){
      eL=resolverSlot16(slots[0]);eV=resolverSlot16(slots[1]);
    }else{
      eL=resolverSlot(slots[0]);eV=resolverSlot(slots[1]);
      if(!esNombreReal(eL))eL=resolverSlot16(slots[0]);
      if(!esNombreReal(eV))eV=resolverSlot16(slots[1]);
    }
    if(esNombreReal(eL))equiposProno.push(eL.trim().toLowerCase());
    if(esNombreReal(eV))equiposProno.push(eV.trim().toLowerCase());
  });
  if(!equiposProno.length)return 0;
  var pts=0;
  equiposReales.forEach(function(eq){
    if(eq&&equiposProno.indexOf(eq)!==-1)pts+=reg.c;
  });
  return pts;
}

function autoHonorDesdeRes(){
  var r104=res[104],r103=res[103];
  if(r104&&r104.gl!=null&&r104.gv!=null&&r104.rl&&r104.rv){
    var rl=r104.rl,rv=r104.rv,camp,sub;
    if(r104.gl>r104.gv){camp=rl;sub=rv;}
    else if(r104.gv>r104.gl){camp=rv;sub=rl;}
    else{camp=(r104.penWin==="L"?rl:rv);sub=(r104.penWin==="L"?rv:rl);}
    hR["campeon"]=camp;hR["subcampeon"]=sub;
  }
  if(r103&&r103.gl!=null&&r103.gv!=null&&r103.rl&&r103.rv){
    var rl3=r103.rl,rv3=r103.rv,ter;
    if(r103.gl>r103.gv)ter=rl3;
    else if(r103.gv>r103.gl)ter=rv3;
    else ter=(r103.penWin==="L"?rl3:rv3);
    hR["tercero_h"]=ter;
  }
}

function resolverSlot(slot){
  if(!slot)return"";
  var mW=slot.match(/^W(\d+)$/);
  if(mW){
    var pid=parseInt(mW[1]);var r=res[pid];
    if(!r||r.gl==null)return slot;
    if(r.gl>r.gv)return r.rl||slot;
    if(r.gv>r.gl)return r.rv||slot;
    if(r.penWin==="L")return r.rl||slot;
    if(r.penWin==="V")return r.rv||slot;
    return(r.rl||"Local")+" (pen?)";
  }
  var mL=slot.match(/^L(\d+)$/);
  if(mL){
    var pid2=parseInt(mL[1]);var r2=res[pid2];
    if(!r2||r2.gl==null)return slot;
    if(r2.gl>r2.gv)return r2.rv||slot;
    if(r2.gv>r2.gl)return r2.rl||slot;
    if(r2.penWin==="L")return r2.rv||slot;
    if(r2.penWin==="V")return r2.rl||slot;
    return(r2.rv||"Visitante")+" (pen?)";
  }
  return slot;
}

    s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    s.onload=construirPDFResultados;
    s.onerror=function(){alert("Error cargando jsPDF.");};
    document.head.appendChild(s);
  }else{construirPDFResultados();}
}

function construirPDFResultados(){
  try{
    var jsPDF=window.jspdf.jsPDF;
    var doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    var W=210,mg=12,y=0;
    var now=new Date();
    var fecha=now.toLocaleDateString("es-CO",{day:"2-digit",month:"long",year:"numeric"})+" | "+now.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
    function newPage(){doc.addPage();y=0;}
    function checkY(n){if(y+n>282)newPage();}
    function banda(col,h){doc.setFillColor(col[0],col[1],col[2]);doc.rect(0,y,W,h,"F");}
    function limpiar(n){if(!n)return"";var s=String(n).normalize("NFD").replace(/[\u0300-\u036f]/g,"");s=s.replace(/\u00f1/g,"n").replace(/\u00d1/g,"N");return s.replace(/\s+/g," ").trim();}
    banda([10,22,40],18);
    doc.setFontSize(13);doc.setFont("helvetica","bold");doc.setTextColor(255,255,255);
    doc.text("POLLA COMPIS 2026 - RESULTADOS REALES",mg,8);
    doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(200,216,240);
    doc.text("Generado: "+fecha,mg,14);y=18;y+=3;
    banda([244,246,250],10);
    doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(60,60,60);
    doc.text("Resultados: "+Object.keys(res).length+"/104   Participantes: "+parts.length,mg,y+6);y+=10;y+=4;
    var GK2=["A","B","C","D","E","F","G","H","I","J","K","L"];
    var clas=parts.map(function(p){
      var tot=0,ex=0;var pr2=p.pronos||{};
      TODOS.forEach(function(pa){var pr=pr2[pa.id],real=res[pa.id];var pts=calcP(pr,real,pa.f);if(pts!==null){tot+=pts;if(pr&&real&&pr.gl===real.gl&&pr.gv===real.gv)ex++;}});
      ["dieciseisavos","octavos","cuartos","semis","final"].forEach(function(fase){tot+=calcClasificadoFase(pr2,fase);});
      (function(){var regS=PTS.semis;if(!regS.clasS)return;
        var gR=[];TODOS.filter(function(pa){return pa.f==="cuartos";}).forEach(function(pa){
          var r=res[pa.id];if(!r||r.gl==null)return;
          var rl=(r.rl||"").trim().toLowerCase(),rv=(r.rv||"").trim().toLowerCase();
          var g=r.gl>r.gv?rl:r.gl<r.gv?rv:(r.penWin==="L"?rl:r.penWin==="V"?rv:"");if(g)gR.push(g);});
        var eP=[];TODOS.filter(function(pa){return pa.f==="cuartos";}).forEach(function(pa){
          var pr=pr2[pa.id];if(!pr)return;
          var pl=(pr.pl||"").trim().toLowerCase(),pv=(pr.pv||"").trim().toLowerCase();
          if(pl)eP.push(pl);if(pv)eP.push(pv);});
        gR.forEach(function(eq){if(eq&&eP.indexOf(eq)!==-1)tot+=regS.clasS;});
      })();
      (function(){var regF=PTS.final;if(!regF.clasF)return;
        var gR=[];TODOS.filter(function(pa){return pa.f==="semis";}).forEach(function(pa){
          var r=res[pa.id];if(!r||r.gl==null)return;
          var rl=(r.rl||"").trim().toLowerCase(),rv=(r.rv||"").trim().toLowerCase();
          var g=r.gl>r.gv?rl:r.gl<r.gv?rv:(r.penWin==="L"?rl:r.penWin==="V"?rv:"");if(g)gR.push(g);});
        var eP=[];TODOS.filter(function(pa){return pa.f==="semis";}).forEach(function(pa){
          var pr=pr2[pa.id];if(!pr)return;
          var pl=(pr.pl||"").trim().toLowerCase(),pv=(pr.pv||"").trim().toLowerCase();
          if(pl)eP.push(pl);if(pv)eP.push(pv);});
        gR.forEach(function(eq){if(eq&&eP.indexOf(eq)!==-1)tot+=regF.clasF;});
      })();
      var hon=p.honor||{};HONOR.forEach(function(h){if(hR[h.k]&&hon[h.k]&&matchHonor(hon[h.k],hR[h.k]))tot+=h.pts;});
      GK2.forEach(function(g){tot+=ptsGrupoPos(g,pr2);});
      return{nombre:p.nombre,pts:tot,exactos:ex,validado:p.validado};
    }).sort(function(a,b){return b.pts-a.pts||b.exactos-a.exactos;});
    checkY(10);banda([200,16,46],7);
    doc.setFontSize(9);doc.setFont("helvetica","bold");doc.setTextColor(255,255,255);
    doc.text("CLASIFICACION GENERAL",mg,y+5);y+=7;y+=1;
    clas.forEach(function(p,i){
      checkY(7);
      doc.setFillColor(i%2===0?255:248,i%2===0?255:249,i%2===0?255:250);doc.rect(mg,y,W-mg*2,6.5,"F");
      doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(60,60,60);doc.text(String(i+1)+".",mg+1,y+4.5);
      doc.setFont("helvetica",i<3?"bold":"normal");doc.setTextColor(10,22,40);doc.text(limpiar(p.nombre),mg+8,y+4.5);
      doc.setFont("helvetica","bold");doc.setTextColor(i===0?200:10,i===0?16:22,i===0?46:40);
      doc.text(String(p.pts)+" pts",W-mg-2,y+4.5,{align:"right"});
      doc.setFont("helvetica","normal");doc.setFontSize(6.5);doc.setTextColor(120,120,120);
      doc.text(p.exactos+" ex"+(p.validado?"  val":"  pend"),W-mg-22,y+4.5);y+=6.5;
    });y+=4;

    // Sección mejores terceros en PDF de resultados
    (function(){
      var gruposConRes=GK2.filter(function(g){
        return GPIDS_G[g].some(function(pid){var r=res[pid];return r&&r.gl!=null;});
      });
      if(!gruposConRes.length)return;
      checkY(20);
      banda([10,22,40],7);
      doc.setFontSize(9);doc.setFont("helvetica","bold");doc.setTextColor(255,255,255);
      doc.text("MEJORES TERCEROS CLASIFICADOS",mg,y+5);y+=7;y+=1;
      var allTerceros=GK2.map(function(g){
        var orden=clasGrupoReal(g);var eq=orden[2];
        if(!eq)return null;
        var s={pts:0,dg:0,gf:0};
        GPIDS_G[g].forEach(function(pid){
          var r=res[pid];if(!r||r.gl==null||r.gv==null)return;
          var pa=TODOS.find(function(p){return p.id===pid;});if(!pa)return;
          if(pa.l===eq){s.pts+=(r.gl>r.gv?3:r.gl===r.gv?1:0);s.gf+=r.gl;s.dg+=(r.gl-r.gv);}
          if(pa.v===eq){s.pts+=(r.gv>r.gl?3:r.gl===r.gv?1:0);s.gf+=r.gv;s.dg+=(r.gv-r.gl);}
        });
        return{equipo:eq,grupo:g,pts:s.pts,dg:s.dg,gf:s.gf};
      }).filter(Boolean);
      allTerceros.sort(function(a,b){
        if(b.pts!==a.pts)return b.pts-a.pts;
        if(b.dg!==a.dg)return b.dg-a.dg;
        if(b.gf!==a.gf)return b.gf-a.gf;
        return a.equipo.localeCompare(b.equipo);
      });
      allTerceros.forEach(function(t,i){
        checkY(7);
        var clasifica=i<8;
        var bg=clasifica?(i%2===0?[232,245,233]:[241,248,233]):(i%2===0?[250,250,250]:[245,245,245]);
        doc.setFillColor(bg[0],bg[1],bg[2]);doc.rect(mg,y,W-mg*2,6,"F");
        doc.setFontSize(8);
        doc.setFont("helvetica","bold");
        doc.setTextColor(clasifica?46:120,clasifica?125:120,clasifica?50:120);
        doc.text((i+1)+".",mg+2,y+4);
        doc.setFont("helvetica",clasifica?"bold":"normal");
        doc.setTextColor(clasifica?27:100,clasifica?94:100,clasifica?32:100);
        doc.text(limpiar(t.equipo)+" (Grupo "+t.grupo+")",mg+8,y+4);
        doc.setFont("helvetica","normal");doc.setTextColor(100,100,100);
        doc.text("Pts:"+t.pts+"  DG:"+(t.dg>=0?"+":"")+t.dg+"  GF:"+t.gf,W-mg-22,y+4);
        if(clasifica){
          doc.setFillColor(46,125,50);doc.roundedRect(W-mg-18,y+1,16,4,1,1,"F");
          doc.setFont("helvetica","bold");doc.setFontSize(7);doc.setTextColor(255,255,255);
          doc.text("clasifica",W-mg-10,y+3.8,{align:"center"});
        }else{
          doc.setFillColor(189,189,189);doc.roundedRect(W-mg-20,y+1,18,4,1,1,"F");
          doc.setFont("helvetica","normal");doc.setFontSize(7);doc.setTextColor(255,255,255);
          doc.text("no clasifica",W-mg-11,y+3.8,{align:"center"});
        }
        y+=6;
      });
      y+=4;
    })();

    FR.forEach(function(fase){
      var partidos=TODOS.filter(function(p){return fase.ids.indexOf(p.id)>=0;});
      var conRes=partidos.filter(function(p){var r=res[p.id];return r&&r.gl!=null;});
      if(!conRes.length)return;
      checkY(10);banda([30,42,70],7);
      doc.setFontSize(9);doc.setFont("helvetica","bold");doc.setTextColor(255,255,255);
      doc.text(fase.lbl+" ("+conRes.length+"/"+partidos.length+")",mg,y+5);y+=7;y+=1;
      conRes.forEach(function(p,idx){
        checkY(7);var r=res[p.id];
        doc.setFillColor(idx%2===0?255:248,idx%2===0?255:249,idx%2===0?255:250);doc.rect(mg,y,W-mg*2,6,"F");
        var nL=limpiar(r.rl||p.l),nV=limpiar(r.rv||p.v);
        doc.setFontSize(7.5);doc.setFont("helvetica","normal");doc.setTextColor(30,30,30);
        doc.text(nL,mg+2,y+4);doc.setFont("helvetica","bold");doc.setTextColor(200,16,46);
        doc.text(r.gl+"-"+r.gv,W/2,y+4,{align:"center"});doc.setFont("helvetica","normal");doc.setTextColor(30,30,30);
        doc.text(nV,W-mg-2,y+4,{align:"right"});
        if(r.penWin){doc.setFontSize(6);doc.setTextColor(230,81,0);doc.text("pen: "+limpiar(r.penWin==="L"?nL:nV),W/2,y+4+2.3,{align:"center"});y+=9;}
        else{y+=6;}
      });y+=3;
    });
    var hayHonor=HONOR.some(function(h){return hR[h.k];});
    if(hayHonor){
      checkY(10);banda([200,16,46],7);
      doc.setFontSize(9);doc.setFont("helvetica","bold");doc.setTextColor(255,255,255);
      doc.text("CUADRO DE HONOR REAL",mg,y+5);y+=7;y+=1;
      HONOR.forEach(function(h,i){
        var val=hR[h.k];if(!val)return;checkY(6.5);
        doc.setFillColor(i%2===0?255:248,i%2===0?255:249,i%2===0?255:250);doc.rect(mg,y,W-mg*2,6,"F");
        doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(80,80,80);
        doc.text(h.l.replace(/[^\u0000-\u007F]/g,"").trim()||h.k+"  ("+h.pts+"pts)",mg+2,y+4);
        doc.setFont("helvetica","bold");doc.setTextColor(10,22,40);doc.text(limpiar(val),W-mg-2,y+4,{align:"right"});y+=6;
      });
    }
    var np=doc.getNumberOfPages();
    for(var pg=1;pg<=np;pg++){doc.setPage(pg);doc.setFillColor(10,22,40);doc.rect(0,287,W,10,"F");doc.setFontSize(7);doc.setFont("helvetica","normal");doc.setTextColor(200,216,240);doc.text("Polla Compis 2026  |  Resultados Oficiales  |  "+fecha,mg,293);doc.text("Pag "+pg+"/"+np,W-mg,293,{align:"right"});}
    doc.save("PollaCompis2026_Resultados_"+now.getTime().toString(36).toUpperCase()+".pdf");
  }catch(err){console.error(err);alert("Error PDF: "+err.message);}
}
</script>
